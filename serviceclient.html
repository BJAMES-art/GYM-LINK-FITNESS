<!doctype html>
<html lang="fr">
  <head>

    <title>Service Client</title>
    <link rel="stylesheet" href="svclient.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"

  <body>
    <header>
      <!-- NAVBAR -->
      <nav class="navbar">
        <h2 class="logo">GYM-LINK <br /><span>Fitness</span></h2>
        <div class="ticker-wrapper">
          <svg viewBox="0 0 1000 120" class="ticker-svg">
            <path
              id="ticker-path"
              d="
        M 120 60
        Q 120 20 160 20
        L 840 20
        Q 880 20 880 60
        Q 880 100 840 100
        L 160 100
        Q 120 100 120 60
      "
              fill="none"
              stroke="rgba(249,178,51,0.2)"
            />

            <text class="ticker-text">
              <textPath id="text1" href="#ticker-path">
                NO PAIN NO GAIN • PUSH YOUR LIMITS • TRAIN HARD • EARN YOUR
                RESULTS • STRENGTH START HERE • LIFT GROW REPEAT • DISCIPLINE
                BUILDS CHAMPIONS • NEVER QUIT • GO •
              </textPath>
            </text>

            <text class="ticker-text">
              <textPath id="text2" href="#ticker-path">
                NO PAIN NO GAIN • PUSH YOUR LIMITS • TRAIN HARD • EARN YOUR
                RESULTS • STRENGTH START HERE • LIFT GROW REPEAT • DISCIPLINE
                BUILDS CHAMPIONS • NEVER QUIT • GO •
              </textPath>
            </text>
          </svg>
        </div>
        <div class="nav-right">
          <a href="index.html" class="nav-link">
            <i class="fa-solid fa-house-chimney"></i>
            <span data-key="trnavlink"></span
          ></a>
          <div class="menu-burger">
            <i class="fas fa-bars" id="menu-btn"></i>
          </div>
        </div>
      </nav>

      <!-- SIDEBAR -->
      <div class="sidebar" id="sidebar">
        <div class="close-btn" id="close-btn">&times;</div>

        <ul>
          <li>
            <a href="nosservices.html" data-key="tr-Services"></a>
          </li>
          <li><a href="tarifs.html" data-key="tr-Tarifs"></a></li>
          <li><a href="contact.html" data-key="tr-Contact"></a></li>
          <li class="active">
            <a href="tutoriels.html" data-key="tr-entr&cons">
              <span>→</span>
            </a>
          </li>
        </ul>

        <div class="bottom">
          <a href="serviceclient.html">
            <span data-key="service_client"></span>
            <i class="fas fa-info-circle"></i>
          </a>

          <div id="google_translate_element">
            <div class="langue">
              <p onclick="toggleMenu()">
                <span id="current-lang">Français</span>
                <i class="fas fa-chevron-down"></i>
              </p>

              <ul id="lang-menu" class="hidden">
                <li onclick="changeLang('fr')">Français</li>
                <li onclick="changeLang('en')">English</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- HERO -->
    <section class="hero-title">
      <h1>
        <span data-key="sc_title1"></span>
        <br />
        <span data-key="sc_title2"></span>
        <br />
        <span data-key="sc_title3"></span>
        <i class="fa-solid fa-question"></i>
      </h1>
    </section>

    <!-- FAQ -->
    <section class="faq">
      <div class="faq-content">
        <h2 data-key="faq_title"></h2>

        <div class="faq-item">
          <div class="faq-question" data-key="faq_q1">
            <i class="fas fa-chevron-down"></i>
          </div>
          <div class="faq-answer" data-key="faq_a1"></div>
        </div>

        <div class="faq-item">
          <div class="faq-question" data-key="faq_q2">
            <i class="fas fa-chevron-down"></i>
          </div>
          <div class="faq-answer" data-key="faq_a2"></div>
        </div>

        <div class="faq-item">
          <div class="faq-question" data-key="faq_q3">
            <i class="fas fa-chevron-down"></i>
          </div>
          <div class="faq-answer" data-key="faq_a3"></div>
        </div>

        <div class="faq-item">
          <div class="faq-question" data-key="faq_q4">
            <i class="fas fa-chevron-down"></i>
          </div>
          <div class="faq-answer" data-key="faq_a4"></div>
        </div>
        <p class="faq-intro" data-key="sc_intro"></p>

        <marquee class="hero-ticker" scrollamount="6">
          NO PAIN NO GAIN • PUSH YOUR LIMITS • TRAIN HARD • STRONGER EVERY DAY •
          DISCIPLINE BUILDS CHAMPIONS • NEVER QUIT •
        </marquee>

      <h2 data-key="contact_title"></h2>

      <p data-key="social_text"></p>

      <div class="social-links">

        </a>

        <a href="https://instagram.com/TON_COMPTE" target="_blank">
          <i class="fab fa-instagram"></i>
        </a>

        <a href="https://facebook.com/TON_COMPTE" target="_blank">
          <i class="fab fa-facebook-f"></i>
        </a>

        <a href="https://t.me/TON_COMPTE" target="_blank">
          <i class="fab fa-telegram"></i>
        </a>

        <a href="https://twitter.com/TON_COMPTE" target="_blank">
          <i class="fab fa-x-twitter"></i>
        </a>

        <a href="https://tiktok.com/@TON_COMPTE" target="_blank">
          <i class="fab fa-tiktok"></i>
        </a>
      </div>
    </section>

    <!-- FOOTER -->
    <footer>
      <p data-key="footer">© 2026 Gym-Link Fitness. Tout droit reservés</p>
